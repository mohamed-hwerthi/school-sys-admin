# ═══════════════════════════════════════
# Backend CI — Spring Boot (Java 17, Maven, PostgreSQL)
# Triggers on PRs and pushes touching backend code
# ═══════════════════════════════════════

name: Backend CI

on:
  pull_request:
    paths: ['school-system-back/**']
  push:
    branches: [main, develop]
    paths: ['school-system-back/**']

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: school_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test
        working-directory: school-system-back
        run: mvn clean verify -B -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/school_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: school-system-back/target/surefire-reports/
          retention-days: 7
