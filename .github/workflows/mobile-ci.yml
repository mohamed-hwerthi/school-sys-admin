name: Mobile CI

on:
  push:
    paths:
      - 'school-system-mobile/**'
  pull_request:
    paths:
      - 'school-system-mobile/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school-system-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: school-system-mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
